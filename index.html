<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHS Class of 2026 Future Plans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRDhCHyBnx64PUN1fXSciKdeuD2exQuxE",
            authDomain: "chsfutureplans.firebaseapp.com",
            projectId: "chsfutureplans",
            storageBucket: "chsfutureplans.firebasestorage.app",
            messagingSenderId: "977172100371",
            appId: "1:977172100371:web:e9a6c788ecbc2581ba96e6",
            measurementId: "G-VPGWCJ76QL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const profilesRef = ref(db, 'profiles');

        window.profiles = [];

        onValue(profilesRef, (snapshot) => {
            const data = snapshot.val();
            window.profiles = [];
            if (data) {
                window.profiles = Object.keys(data).map(key => ({
                    ...data[key],
                    firebaseKey: key
                }));
            }
            renderGrids();
        });

        window.submitToFirebase = async (profileData) => { await push(profilesRef, profileData); };
        window.updateFirebase = async (key, updatedData) => { await update(ref(db, `profiles/${key}`), updatedData); };
        window.deleteFirebase = async (key) => { await remove(ref(db, `profiles/${key}`)); };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1e40af', secondary: '#bfdbfe', chsBlue: '#1e40af' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .profile-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.25rem; }
        .person-card { transition: all 0.2s ease; height: 100%; display: flex; flex-direction: column; background: white; }
        .person-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .card-image-container { aspect-ratio: 3 / 4; width: 100%; overflow: hidden; background-color: #1e40af; }
        
        .modal-overlay { transition: opacity 0.3s ease; display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal-content { transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); background: white; border-radius: 0.75rem; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .active .modal-content { transform: scale(1); opacity: 1; }

        /* Updated Form Styles to match Image */
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            color: #111827;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #1e40af;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(30, 64, 175, 0.1);
        }
        .form-input::placeholder {
            color: #9ca3af;
        }

        @media (max-width: 1024px) { .profile-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 640px) { .profile-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; } .person-card h2 { font-size: 0.875rem !important; } .person-card p { font-size: 0.7rem !important; } .p-6 { padding: 0.75rem !important; } }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

    <header class="bg-white shadow-md sticky top-0 z-40 py-8 px-4">
        <div class="max-w-7xl mx-auto flex flex-col items-center text-center">
            <img src="https://resources.finalsite.net/images/f_auto,q_auto/v1668797119/ccsk12inus/awfkuopbc2f6uupyira9/CarmelHighSchoolLogo.png" alt="CHS Greyhound Logo" class="h-16 w-auto mb-3" />
            <h1 class="text-2xl md:text-4xl font-extrabold text-blue-800 leading-tight">Class of 2026<br>Future Plans</h1>
            <p class="text-gray-500 mt-2 text-sm italic font-medium mb-6">Brought to you by <a href="https://hilite.org" class="hover:text-blue-600 underline text-blue-800">HiLite News.</a></p>

            <div class="relative w-full max-w-md mb-6 text-gray-800">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-search"></i></span>
                <input type="text" id="search-bar" onkeyup="renderGrids()" placeholder="Search name, college, or major..." 
                    class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-full bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col items-center gap-3">
                <button id="add-profile-btn" onclick="openModal('add-modal')" class="bg-blue-800 text-white font-extrabold py-3 px-8 rounded-lg shadow-lg hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Your Plan
                </button>
                <button id="logout-btn" class="hidden text-gray-500 text-sm font-semibold hover:underline" onclick="adminLogout()">Admin Logout</button>
            </div>
        </div>
    </header>

    <div id="pending-section" class="hidden bg-amber-50 border-b border-amber-200 p-6">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-lg font-extrabold text-amber-800 mb-4 italic"><i class="fas fa-clock mr-2"></i> Pending Approvals</h2>
            <div id="pending-grid" class="profile-grid"></div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-12 flex-grow w-full">
        <div id="profile-grid" class="profile-grid"></div>
    </main>

    <footer class="py-10 text-center">
        <button id="login-trigger" onclick="openModal('admin-login-modal')" class="text-gray-300 hover:text-gray-500 text-xs transition-colors font-medium">Admin Login</button>
    </footer>

    <!-- ADD/EDIT MODAL - Styled to match image -->
    <div id="add-modal" class="modal-overlay" onclick="closeModal('add-modal')">
        <div class="modal-content max-w-lg p-8" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-3xl font-extrabold text-[#1e40af]">Submit Your Plan</h2>
                <button onclick="closeModal('add-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            
            <hr class="border-gray-200 mb-8">

            <form id="submission-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">First Name</label>
                        <input type="text" id="first-name" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Last Name</label>
                        <input type="text" id="last-name" required class="form-input">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Plan Category</label>
                        <input type="text" id="plan-category" placeholder="e.g. College" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Institution</label>
                        <input type="text" id="college" placeholder="e.g. Purdue University" class="form-input">
                    </div>
                </div>

                <div>
                    <label class="form-label">Intended Major / Focus</label>
                    <input type="text" id="major" placeholder="e.g. Business Administration" class="form-input">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="form-label">Type</label>
                        <select id="social-type" class="form-input appearance-none bg-no-repeat bg-right pr-10" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%236b7280%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E'); background-position: right 0.75rem center; background-size: 1.2em auto;">
                            <option value="instagram">Instagram</option>
                            <option value="tiktok">TikTok</option>
                            <option value="phone">Phone</option>
                            <option value="email">Email</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Handle / Info</label>
                        <input type="text" id="social" placeholder="username" class="form-input">
                    </div>
                </div>

                <div>
                    <label class="form-label">Photo (Optional)</label>
                    <input type="file" id="photo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>

                <div class="pt-2">
                    <button type="submit" id="submit-btn-text" class="w-full bg-[#1e40af] text-white font-extrabold py-4 rounded-lg shadow-lg hover:bg-blue-800 transition active:scale-[0.98] uppercase tracking-wider text-lg">
                        Submit for Approval
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADMIN LOGIN MODAL -->
    <div id="admin-login-modal" class="modal-overlay" onclick="closeModal('admin-login-modal')">
        <div class="modal-content max-w-sm p-8 text-center" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Password" class="form-input mb-4 text-center">
            <div class="flex gap-2">
                <button onclick="closeModal('admin-login-modal')" class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-gray-600">Cancel</button>
                <button onclick="adminLogin()" class="flex-1 bg-blue-800 text-white py-2 rounded-lg font-bold">Login</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "greyhounds2026"; 
        let isAdmin = false;
        const SOCIAL_ICONS = { instagram: 'fab fa-instagram', tiktok: 'fab fa-tiktok', phone: 'fas fa-phone-alt', email: 'fas fa-envelope' };

        function openModal(id) { 
            document.getElementById(id).classList.add('active'); if(id === 'admin-login-modal') document.getElementById('admin-pass').focus(); 
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active');
            if(id === 'admin-login-modal') document.getElementById('admin-pass').value = '';
            if(id === 'add-modal') { document.getElementById('submission-form').reset(); document.getElementById('edit-id').value = ''; document.getElementById('modal-title').innerText = "Submit Your Plan"; }
        }

        function adminLogin() { if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) { isAdmin = true; document.getElementById('logout-btn').classList.remove('hidden'); document.getElementById('login-trigger').classList.add('hidden'); closeModal('admin-login-modal'); renderGrids(); } else { alert("Wrong password"); } }
        function adminLogout() { isAdmin = false; document.getElementById('logout-btn').classList.add('hidden'); document.getElementById('login-trigger').classList.remove('hidden'); renderGrids(); }

        document.getElementById('submission-form').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const photoFile = document.getElementById('photo').files[0];
            let photoBase64 = '';
            let existing = editId ? window.profiles.find(p => p.firebaseKey == editId) : null;
            if (photoFile) { photoBase64 = await new Promise(r => { const reader = new FileReader(); reader.onload = (e) => r(e.target.result); reader.readAsDataURL(photoFile); }); } else if (existing) { photoBase64 = existing.photo || ''; }

            const profileData = {
                firstName: document.getElementById('first-name').value,
                lastName: document.getElementById('last-name').value,
                planCategory: document.getElementById('plan-category').value || 'College',
                college: document.getElementById('college').value || 'Decision Pending',
                major: document.getElementById('major').value || 'Undecided',
                socialType: document.getElementById('social-type').value,
                social: document.getElementById('social').value.replace(/^(insta:|@)/, ''),
                photo: photoBase64,
                status: existing ? existing.status : 'pending'
            };

            if (existing) { await window.updateFirebase(editId, profileData); }
            else { await window.submitToFirebase(profileData); alert("Submitted for approval."); }
            closeModal('add-modal');
        };

        function createCard(p) {
            const initials = (p.firstName[0] + (p.lastName[0] || '')).toUpperCase();
            const icon = SOCIAL_ICONS[p.socialType || 'instagram'];
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-sm person-card overflow-hidden border border-gray-100 relative';
            let adminBtns = isAdmin ? `
                <div class="absolute top-2 right-2 flex gap-1 z-30">
                    ${p.status === 'pending' ? `<button onclick="handleApprove(event, '${p.firebaseKey}')" class="bg-green-600 text-white w-7 h-7 rounded-full shadow flex items-center justify-center hover:bg-green-700 transition-colors"><i class="fas fa-check text-[10px]"></i></button>` : ''}
                    <button onclick="handleEdit(event, '${p.firebaseKey}')" class="bg-blue-600 text-white w-7 h-7 rounded-full shadow flex items-center justify-center hover:bg-blue-700 transition-colors"><i class="fas fa-edit text-[10px]"></i></button>
                    <button onclick="handleDelete(event, '${p.firebaseKey}')" class="bg-red-600 text-white w-7 h-7 rounded-full shadow flex items-center justify-center hover:bg-red-700 transition-colors"><i class="fas fa-trash text-[10px]"></i></button>
                </div>` : '';
            const img = p.photo ? `<img src="${p.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-4xl font-bold text-white bg-[#1e40af]">${initials}</div>`;
            card.innerHTML = `${adminBtns}<div class="card-image-container">${img}</div><div class="p-4 flex-grow text-center"><h2 class="text-base md:text-xl font-bold text-gray-800 mb-1 leading-tight">${p.firstName} ${p.lastName}</h2><div class="border-t border-gray-100 pt-3 mt-2 text-center"><p class="text-[9px] md:text-[10px] font-extrabold text-blue-800 uppercase tracking-widest mb-1">${p.planCategory}</p><p class="text-sm md:text-base font-semibold text-gray-700 leading-tight">${p.college}</p><p class="text-xs md:text-sm text-gray-500 italic mt-1">${p.major}</p></div>${p.social ? `<div class="mt-4 flex items-center justify-center text-blue-600 font-semibold text-[10px] md:text-xs"><i class="${icon} mr-2"></i> ${p.social}</div>` : ''}</div>`;
            return card;
        }

        window.renderGrids = () => {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const sorted = [...window.profiles].filter(p => `${p.firstName} ${p.lastName} ${p.college} ${p.major}`.toLowerCase().includes(query)).sort((a, b) => (a.lastName || "").localeCompare(b.lastName || ""));
            const publicGrid = document.getElementById('profile-grid');
            const pendingGrid = document.getElementById('pending-grid');
            publicGrid.innerHTML = ''; pendingGrid.innerHTML = '';
            let pCount = 0;
            sorted.forEach(p => { if (p.status === 'approved') publicGrid.appendChild(createCard(p)); else if (isAdmin && p.status === 'pending') { pendingGrid.appendChild(createCard(p)); pCount++; } });
            document.getElementById('pending-section').classList.toggle('hidden', !isAdmin || pCount === 0);
        }

        async function handleApprove(e, key) { e.stopPropagation(); await window.updateFirebase(key, { status: 'approved' }); }
        async function handleDelete(e, key) { e.stopPropagation(); if(confirm('Delete?')) await window.deleteFirebase(key); }
        function handleEdit(e, key) { e.stopPropagation(); const p = window.profiles.find(p => p.firebaseKey === key); document.getElementById('edit-id').value = key; document.getElementById('first-name').value = p.firstName; document.getElementById('last-name').value = p.lastName; document.getElementById('plan-category').value = p.planCategory; document.getElementById('college').value = p.college; document.getElementById('major').value = p.major; document.getElementById('social-type').value = p.socialType; document.getElementById('social').value = p.social; document.getElementById('modal-title').innerText = "Edit Profile"; openModal('add-modal'); }
        document.getElementById('admin-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') adminLogin(); });
    </script>
</body>
</html>
